# ══════════════════════════════════════════════════════════════════════════════
# Smart Personal Wealth — Azure DevOps CI/CD Pipeline
# Backend  : Build Docker image → push to ACR → deploy to Container Apps
# Frontend : Deploy to Azure Static Web Apps
# ══════════════════════════════════════════════════════════════════════════════

trigger:
  branches:
    include:
      - master
  paths:
    exclude:
      - README.md
      - "*.png"
      - "*.jpg"
      - "*.gif"
      - database/**

variables:
  - group: smartwealth-vars   # ← Library Variable Group
  - name: imageRepository
    value: 'smartwealth-api'
  - name: imageTag
    value: '$(Build.BuildId)'
  - name: acrLoginServer
    value: '$(ACR_LOGIN_SERVER)'
  - name: resourceGroup
    value: '$(RESOURCE_GROUP)'
  - name: containerAppName
    value: '$(CONTAINER_APP_NAME)'
  - name: azureSubscription
    value: '$(AZURE_SERVICE_CONNECTION)'

stages:
# ──────────────────────────────────────────────────────────────────────────────
# Stage 1 — Deploy Database（與 Build 並行，冪等可重複執行）
# ──────────────────────────────────────────────────────────────────────────────
- stage: DeployDatabase
  displayName: 'Deploy Database'
  dependsOn: []
  jobs:
  - job: RunMigrations
    displayName: 'Run SQL Scripts'
    pool:
      name: Default
    steps:
    - task: PowerShell@2
      displayName: 'Run deploy.ps1'
      inputs:
        filePath: 'database/deploy.ps1'
        pwsh: true
      env:
        DB_SERVER:   $(DB_SERVER)
        DB_NAME:     $(DB_NAME)
        DB_USER:     $(DB_USER)
        DB_PASSWORD: $(DB_PASSWORD)

# ──────────────────────────────────────────────────────────────────────────────
# Stage 2 — Build & Push Docker Image
# ──────────────────────────────────────────────────────────────────────────────
- stage: Build
  displayName: 'Build & Push to ACR'
  jobs:
  - job: BuildAndPush
    displayName: 'Docker Build & Push'
    pool:
      name: Default
    steps:

    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        command: build
        repository: '$(acrLoginServer)/$(imageRepository)'
        dockerfile: 'backend/SmartWealth.API/Dockerfile'
        buildContext: 'backend/SmartWealth.API'
        tags: |
          $(imageTag)
          latest

    - task: Docker@2
      displayName: 'Push to ACR'
      inputs:
        command: push
        containerRegistry: 'acr-smartwealth'
        repository: '$(imageRepository)'
        tags: |
          $(imageTag)
          latest

# ──────────────────────────────────────────────────────────────────────────────
# Stage 2 — Deploy Backend to Azure Container Apps
# ──────────────────────────────────────────────────────────────────────────────
- stage: DeployBackend
  displayName: 'Deploy Backend'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployContainerApp
    displayName: 'Update Container App'
    pool:
      name: Default
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: 'Deploy to Container Apps'
            inputs:
              azureSubscription: 'azure-smartwealth'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az containerapp update `
                  --name $(containerAppName) `
                  --resource-group $(resourceGroup) `
                  --image $(acrLoginServer)/$(imageRepository):$(imageTag) `
                  --min-replicas 1 `
                  --set-env-vars `
                    ConnectionStrings__SmartWealth="$(DB_CONNECTION_STRING)" `
                    ConnectionStrings__Redis="$(REDIS_CONNECTION_STRING)" `
                    Jwt__Secret="$(JWT_SECRET)" `
                    Resend__ApiKey="$(RESEND_API_KEY)" `
                    Google__ClientId="$(GOOGLE_CLIENT_ID)" `
                    Google__ClientSecret="$(GOOGLE_CLIENT_SECRET)" `
                    ServiceBus__ConnectionString="$(SERVICEBUS_CONNECTION_STRING)" `
                    Cors__AllowedOrigin="$(CORS_ALLOWED_ORIGIN)"

# ──────────────────────────────────────────────────────────────────────────────
# Stage 3 — Deploy Frontend to Azure Static Web Apps
# ──────────────────────────────────────────────────────────────────────────────
- stage: DeployFrontend
  displayName: 'Deploy Frontend'
  dependsOn: []        # 不依賴後端，並行執行
  condition: succeeded()
  jobs:
  - job: DeployStaticWebApp
    displayName: 'Deploy to Static Web Apps'
    pool:
      name: Default
    steps:
    - script: npm install -g @azure/static-web-apps-cli
      displayName: 'Install SWA CLI'
    - script: swa deploy frontend --deployment-token "$(STATIC_WEB_APP_TOKEN)" --env production
      displayName: 'Deploy Frontend SPA'
