<!DOCTYPE html>
<html class="dark" lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>The Private Ledger — 精準掌控每一分財富</title>
    <meta name="description" content="The Private Ledger 是一款高端個人財富管理工具，提供記帳、投資組合追蹤與財務分析功能。" />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Google Fonts: Manrope (Headlines) + Inter (Body) -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind Config: The Private Ledger Design System -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-fixed-variant": "#005137",
                        "on-primary-fixed-variant": "#3c475d",
                        "outline-variant": "#45474d",
                        "on-tertiary-fixed": "#002114",
                        "surface-bright": "#393939",
                        "on-error": "#690005",
                        "tertiary-fixed": "#68fcbf",
                        "inverse-on-surface": "#313030",
                        "error": "#ffb4ab",
                        "on-tertiary-container": "#00a171",
                        "on-tertiary": "#003825",
                        "on-error-container": "#ffdad6",
                        "inverse-primary": "#545e76",
                        "background": "#131313",
                        "surface-tint": "#bbc6e2",
                        "on-secondary-fixed-variant": "#005236",
                        "tertiary-container": "#002d1d",
                        "secondary-fixed": "#6ffbbe",
                        "secondary-fixed-dim": "#4edea3",
                        "primary-fixed": "#d7e2ff",
                        "surface-container-highest": "#353534",
                        "secondary-container": "#00a572",
                        "on-primary": "#263046",
                        "surface-container-lowest": "#0e0e0e",
                        "on-secondary-container": "#00311f",
                        "on-background": "#e5e2e1",
                        "on-secondary": "#003824",
                        "surface-variant": "#353534",
                        "secondary": "#4edea3",
                        "surface-container-low": "#1c1b1b",
                        "on-primary-fixed": "#101b30",
                        "outline": "#8f9097",
                        "surface-container": "#201f1f",
                        "on-surface": "#e5e2e1",
                        "error-container": "#93000a",
                        "tertiary-fixed-dim": "#45dfa4",
                        "primary": "#bbc6e2",
                        "on-secondary-fixed": "#002113",
                        "primary-fixed-dim": "#bbc6e2",
                        "on-surface-variant": "#c5c6cd",
                        "inverse-surface": "#e5e2e1",
                        "surface-dim": "#131313",
                        "primary-container": "#1b263b",
                        "tertiary": "#45dfa4",
                        "surface-container-high": "#2a2a2a",
                        "surface": "#131313",
                        "on-primary-container": "#828da7"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>

    <!-- Custom Styles -->
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #131313;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
        }
        /* Glass Effect - per DESIGN.md */
        .glass-effect {
            background: rgba(53, 53, 52, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        /* Signature Editorial Gradient - per DESIGN.md */
        .editorial-gradient {
            background: linear-gradient(135deg, #bbc6e2 0%, #1b263b 100%);
        }
        /* Editorial Grid */
        .editorial-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1.5rem;
        }
        /* Number Input: Remove spinners */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }
        /* Hide scrollbar */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Page transition */
        .page-enter { animation: pageEnter 0.3s ease-out forwards; }
        .page-exit { animation: pageExit 0.2s ease-in forwards; }
        @keyframes pageEnter {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pageExit {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-8px); }
        }
        /* Chart bar animation */
        .chart-bar { transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        /* Editorial shadow */
        .editorial-shadow {
            box-shadow: 0 32px 64px -12px rgba(229, 226, 225, 0.08);
        }
    </style>
</head>
<body class="antialiased overflow-x-hidden selection:bg-primary/30 selection:text-on-primary">

    <!-- SPA Root Container -->
    <div id="app"></div>

    <!-- JavaScript Modules -->
    <script src="js/router.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components/sidebar.js"></script>
    <script src="js/components/topbar.js"></script>
    <script src="js/pages/login.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/add-transaction.js"></script>
    <script src="js/pages/history.js"></script>
    <script src="js/pages/portfolio.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
